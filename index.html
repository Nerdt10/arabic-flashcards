<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arabic Reading Proficiency</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#2980b9;
  --blue-dark:#1a5f8a;
  --blue-light:#e8f2fa;
  --orange:#e67e22;
  --orange-dark:#ca6d12;
  --orange-light:#fef3e2;
  --white:#ffffff;
  --offwhite:#f2f2f2;
  --text:#1a1a2e;
  --text2:#666;
  --text3:#aaa;
  --border:#e2e2e2;
  --sidebar-bg:#ebebeb;
  --sidebar-border:#d8d8d8;
  --sidebar-text:#333;
  --sidebar-text2:#777;
  --sidebar-active:#ffffff;
  --sidebar-hover:#e0e0e0;
  --sidebar-w:280px;
}
body{font-family:'Cairo',sans-serif;background:var(--offwhite);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:width 0.25s ease,min-width 0.25s ease;min-height:0;}
.sidebar.collapsed{width:0;min-width:0;overflow:hidden;}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.3);}
.sidebar-overlay.vis{display:block;}
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:100;}
  .main{width:100%;}
}
.sidebar-logo{padding:12px 14px 8px;border-bottom:1px solid #e0e0e0;background:#fff;text-align:center;}
.sidebar-logo h1{font-size:0.82rem;font-weight:700;color:#222;line-height:1.3;}
.sidebar-logo p{font-size:0.67rem;color:#999;margin-top:2px;}

/* closed section — white, quiet */
.section-block{border-bottom:1px solid #ececec;background:#fff;}
.sidebar-level{display:flex;align-items:center;cursor:pointer;padding:10px 12px 10px 0;border-left:3px solid transparent;transition:all 0.15s;white-space:nowrap;}
.sidebar-level:hover:not(.active){background:#f5f5f5;}
.level-num{width:36px;min-width:36px;text-align:center;font-size:0.72rem;font-weight:700;color:#bbb;flex-shrink:0;}
.level-text span{display:block;font-size:0.78rem;font-weight:500;color:#aaa;line-height:1.3;}
.level-text small{display:none;}

/* active section — pops forward */
.section-block.open{background:#f7f7f7;border-bottom:2px solid #d0d0d0;}
.section-block.open .sidebar-level{border-left-color:var(--orange);background:#fff;}
.section-block.open .level-num{color:var(--orange);}
.section-block.open .level-text span{color:#222;font-weight:700;font-size:0.82rem;}
.section-block.open .level-text small{display:block;font-size:0.64rem;color:#888;margin-top:1px;}

/* sublevel drawer */
.sublevel-list{display:none;border-left:3px solid var(--orange);}
.section-block.open .sublevel-list{display:block;}
.sublevel-item{display:block;padding:7px 12px 7px 32px;font-size:0.73rem;color:#777;cursor:pointer;transition:background 0.12s,color 0.12s;white-space:nowrap;border-top:1px solid #ececec;background:#f7f7f7;}
.sublevel-item:first-child{border-top:none;}
.sublevel-item:hover{background:#efefef;color:#333;}
.sublevel-item.active{color:var(--blue-dark);font-weight:700;background:#fff;border-left:2px solid var(--blue-dark);padding-left:30px;}

/* DOWNLOAD LINK */
.sidebar-download{display:block;margin-top:auto;padding:14px 16px;background:var(--blue);color:#fff;font-size:0.78rem;font-weight:600;text-align:center;text-decoration:none;transition:background 0.15s;cursor:pointer;border-top:1px solid #d0d0d0;flex-shrink:0;white-space:nowrap;}
.sidebar-download:hover{background:var(--blue-dark);}
.sidebar-download svg{display:inline-block;vertical-align:middle;margin-right:6px;margin-top:-2px;}

/* HAMBURGER */
.hamburger{background:none;border:none;cursor:pointer;padding:6px 8px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;align-items:center;justify-content:center;}
.hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;transition:background 0.15s;}
.hamburger:hover span{background:var(--blue-dark);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto;align-items:center;min-height:0;}

/* TOPBAR */
.topbar{width:100%;background:var(--white);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-title{flex:1;text-align:center;}
.topbar-title h2{font-size:1.15rem;font-weight:700;color:var(--text);}
.topbar-title p{font-size:0.72rem;color:var(--text2);margin-top:1px;}

/* CONTENT */
.content-area{width:100%;max-width:520px;padding:20px 16px 40px;display:flex;flex-direction:column;gap:14px;align-items:center;margin:auto;}

/* INFO */
.info-label{font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.04em;text-transform:uppercase;align-self:flex-start;}

/* MODE BAR */
.mode-bar{display:flex;gap:0;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;width:100%;}
.mode-btn{flex:1;padding:7px 0;border:none;border-right:1.5px solid var(--border);background:var(--white);font-family:'Cairo',sans-serif;font-size:0.78rem;font-weight:600;color:var(--text2);cursor:pointer;transition:background 0.15s,color 0.15s;}
.mode-btn:last-child{border-right:none;}
.mode-btn.active{background:var(--blue);color:#fff;}
.mode-btn:hover:not(.active){background:var(--blue-light);color:var(--blue-dark);}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:10px;width:100%;}
.progress-track{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;cursor:pointer;transition:height 0.15s;}
.progress-track:hover{height:10px;}
.progress-fill{height:100%;background:var(--orange);border-radius:99px;transition:width 0.35s ease;}
.progress-label{font-size:0.75rem;color:var(--text2);min-width:46px;text-align:right;font-weight:600;}

/* FLASHCARD */
.flashcard{background:var(--white);border:1.5px solid var(--border);border-radius:10px;width:100%;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:2rem 1.5rem 2rem;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;user-select:none;}
.flashcard:hover{border-color:var(--blue-dark);box-shadow:0 2px 12px rgba(41,128,185,0.08);}
.flashcard:active{transform:scale(0.99);}
.flashcard.playing{border-color:var(--orange);box-shadow:0 0 0 3px rgba(230,126,34,0.12);}
.card-badge{position:absolute;top:10px;left:10px;background:var(--orange);color:#fff;font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:3px;}
.card-arabic{font-family:'Scheherazade New',serif;font-size:96px;line-height:1;color:var(--text);direction:rtl;text-align:center;transition:opacity 0.15s;margin-bottom:20px;}
.card-arabic.sm{font-size:64px;}
.card-arabic.xs{font-size:44px;}
.card-arabic.xxs{font-size:32px;}
.card-reveal{display:flex;flex-direction:column;align-items:center;gap:4px;}
.card-reveal.hidden{display:none;}
.card-name{font-size:1.1rem;font-weight:700;color:var(--blue-dark);text-align:center;}
.card-trans{font-size:0.82rem;color:var(--text2);text-align:center;}
.card-hint{position:absolute;bottom:10px;right:14px;font-size:0.7rem;color:var(--text3);display:flex;align-items:center;gap:4px;}
.card-video-btn{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border2);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;color:var(--orange);}
.card-video-btn:hover{background:var(--orange-light);border-color:var(--orange);}
.card-video-mode{display:none;flex-direction:column;align-items:stretch;position:absolute;inset:0;border-radius:10px;overflow:hidden;z-index:1;background:#111;}
.card-video-mode.active{display:flex;}
.card-letter-mode{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;}
.card-letter-mode.hidden{display:none;}
.video-player{width:100%;flex:1;background:#111;overflow:hidden;position:relative;display:flex;}
.video-player video{width:100%;height:100%;display:block;object-fit:contain;flex:1;}
.video-close{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.video-close:hover{background:rgba(0,0,0,0.75);}
.card-parts{display:flex;gap:14px;direction:rtl;flex-wrap:wrap;justify-content:center;}

/* FORMS GRID — clickable */
.forms-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;min-height:0;}
.form-cell{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.form-cell:hover:not(.hl){border-color:var(--blue);background:var(--blue-light);}
.form-cell.hl{background:var(--blue-light);border-color:var(--blue);border-width:2px;}
.form-cell.hl .form-arabic{color:var(--blue-dark);}
.form-cell.hl .form-label{color:var(--blue-dark);font-weight:600;}
.form-arabic{font-family:'Scheherazade New',serif;font-size:28px;color:var(--text);direction:rtl;}
.form-label{font-size:0.62rem;color:var(--text2);text-align:center;}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:10px;justify-content:center;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 20px;border:1.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);font-family:'Cairo',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn:hover{border-color:var(--blue);color:var(--blue);}
.btn:active{transform:scale(0.96);}
.btn:disabled{opacity:0.3;cursor:default;}
.btn-play{width:52px;height:52px;padding:0;border-radius:50%;background:var(--orange);border-color:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;}
.btn-play:hover{background:var(--orange-dark);border-color:var(--orange-dark);color:#fff;}

/* AUTO SETTINGS */
.auto-box{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;display:none;flex-direction:column;gap:10px;width:100%;}
.auto-box.vis{display:flex;}
.set-row{display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--text2);}
.set-row label{min-width:100px;font-weight:600;}
.set-row input[type=range]{flex:1;accent-color:var(--orange);}
.set-row select{padding:4px 8px;border:1.5px solid var(--border);border-radius:4px;background:var(--offwhite);font-family:'Cairo',sans-serif;font-size:0.8rem;color:var(--text);}
.set-val{min-width:28px;text-align:right;font-weight:700;color:var(--blue-dark);}

/* DONE */
.done-banner{background:#eafaf1;border:1.5px solid #27ae60;border-radius:8px;padding:12px 16px;text-align:center;font-size:0.88rem;color:#1e8449;font-weight:700;display:none;width:100%;}
.done-banner.vis{display:block;}

/* QUIZ */
.quiz-count-bar{display:none;align-items:center;gap:8px;margin-left:auto;}
.quiz-count-bar.vis{display:flex;}
.qc-label{font-size:12px;color:var(--text3);}
/* quiz timeline tracker */
.quiz-layout{display:flex;flex-direction:column;gap:12px;width:100%;}
.quiz-main{flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;}
.quiz-tracker{width:100%;padding:0 4px;}
.qt-timeline{position:relative;height:20px;display:flex;align-items:center;}
.qt-line{position:absolute;left:0;right:0;height:1.5px;background:var(--border);}
.qt-dots{display:flex;justify-content:space-between;width:100%;position:relative;z-index:1;}
.qt-dot{width:10px;height:10px;border-radius:50%;background:var(--white);border:1.5px solid var(--border);cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.qt-dot.correct{background:var(--text);border-color:var(--text);}
.qt-dot.wrong{background:transparent;border-color:var(--text);}
.qt-dot.current{width:14px;height:14px;background:var(--blue);border-color:var(--blue);box-shadow:0 0 0 3px rgba(41,128,185,0.18);margin-top:-2px;}
.qt-dot:hover:not(.current){transform:scale(1.3);}
.qt-ends{display:flex;justify-content:space-between;margin-top:4px;}
.qt-ends span{font-size:10px;color:var(--text3);}
.section-block.open .grey-star{display:none;}

/* drag-drop question */
.dd-wrap{width:100%;display:flex;flex-direction:column;gap:14px;align-items:center;}
.dd-zones{display:flex;flex-direction:row-reverse;justify-content:center;gap:8px;width:100%;}
.dd-zone{width:64px;height:72px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Scheherazade New',serif;font-size:36px;direction:rtl;transition:all 0.15s;background:var(--white);position:relative;}
.dd-zone.over{border-color:var(--blue);background:var(--blue-light);}
.dd-zone.correct{border-color:#27ae60;background:#eafaf1;border-style:solid;animation:pop 0.3s ease;}
.dd-zone.wrong{border-color:#e74c3c;background:#fdf0ef;border-style:solid;}
.dd-zone .zone-label{position:absolute;bottom:4px;font-size:9px;color:var(--text3);font-family:'Cairo',sans-serif;}
.dd-tiles{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;width:100%;}
.dd-tile{width:56px;height:64px;border:2px solid var(--border);border-radius:8px;background:var(--white);display:flex;align-items:center;justify-content:center;font-family:'Scheherazade New',serif;font-size:36px;direction:rtl;cursor:grab;transition:all 0.15s;user-select:none;}
.dd-tile:hover{border-color:var(--blue);background:var(--blue-light);}
.dd-tile.dragging{opacity:0.4;cursor:grabbing;}
.dd-tile.used{opacity:0.25;pointer-events:none;}
.quiz-wrap{width:100%;display:none;flex-direction:column;gap:16px;align-items:center;}
.quiz-wrap.vis{display:flex;}
.quiz-listen{width:72px;height:72px;border-radius:50%;background:var(--blue);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;box-shadow:0 2px 12px rgba(41,128,185,0.25);}
.quiz-listen:hover{background:var(--blue-dark);transform:scale(1.05);}
.quiz-listen.playing{background:var(--orange);box-shadow:0 2px 16px rgba(230,126,34,0.35);}
.quiz-prompt{font-size:0.85rem;color:var(--text2);text-align:center;}
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.quiz-opt{padding:18px 12px 22px;border:2px solid var(--border);border-radius:10px;background:var(--white);font-family:'Scheherazade New',serif;font-size:52px;text-align:center;cursor:pointer;transition:all 0.15s;direction:rtl;line-height:1.2;display:flex;align-items:center;justify-content:center;min-height:90px;}
.quiz-opt:hover{border-color:var(--blue);background:var(--blue-light);}
.quiz-opt.correct{border-color:#27ae60;background:#eafaf1;animation:pop 0.3s ease;}
.quiz-opt.wrong{border-color:#e74c3c;background:#fdf0ef;}
.quiz-opt.reveal{border-color:#27ae60;background:#eafaf1;}
.quiz-opt:disabled{cursor:default;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.quiz-score{font-size:0.8rem;color:var(--text2);font-weight:600;}
.quiz-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;display:none;align-items:center;justify-content:center;}
.quiz-modal-overlay.vis{display:flex;}
.quiz-modal{background:var(--white);border-radius:14px;padding:32px 28px;text-align:center;width:90%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,0.18);}
.quiz-modal h3{font-size:1.3rem;font-weight:700;}
.quiz-modal.pass h3{color:#27ae60;}
.quiz-modal.fail h3{color:#e74c3c;}
.quiz-modal p{font-size:0.88rem;color:var(--text2);line-height:1.5;}
.quiz-modal .score-big{font-size:2.5rem;font-weight:700;color:var(--blue-dark);}
.sidebar-check{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#27ae60;margin-left:6px;flex-shrink:0;}
.sidebar-check svg{display:block;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title">
      <h2 id="topTitle">1. Alphabet</h2>
      <p id="topDesc">The Alphabet — All 28 letters — isolated form</p>
    </div>
    <div class="quiz-count-bar" id="quizCountBar">
      <select id="qcSelect" style="font-size:13px;padding:5px 10px;border:0.5px solid var(--border2);border-radius:6px;background:var(--white);color:var(--text2);cursor:pointer;font-family:inherit;" onchange="setQuizTotal(parseInt(this.value))">
        <option value="10">10 questions</option>
        <option value="15">15 questions</option>
        <option value="20">20 questions</option>
        <option value="25">25 questions</option>
      </select>
    </div>
  </div>

  <div class="content-area">
    <div class="mode-bar" id="modeBar">
      <button class="mode-btn active" onclick="setMode('seq',this)">In order</button>
      <button class="mode-btn" onclick="setMode('rand',this)">Random</button>
      <button class="mode-btn" onclick="setMode('auto',this)">Auto-play</button>
    </div>

    <div class="progress-row">
      <div class="progress-track" id="progressTrack" style="cursor:pointer;" onclick="scrubProgress(event)" onmousedown="startScrub(event)" ontouchstart="startScrub(event)"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
      <span class="progress-label" id="pLabel">1 / 1</span>
    </div>

    <div class="flashcard" id="card">
      <div class="card-badge" id="cardBadge"></div>

      <!-- video icon button — only shown in alphabet section -->
      <button class="card-video-btn" id="videoBtn" onclick="toggleVideo(event)" aria-label="Watch pronunciation" style="display:none;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </button>

      <!-- normal letter mode -->
      <div class="card-letter-mode" id="letterMode" onclick="handleClick()">
        <div class="card-arabic" id="cardAr"></div>
        <div class="card-reveal hidden" id="cardReveal">
          <div class="card-parts" id="cardParts"></div>
          <div class="card-name" id="cardName"></div>
          <div class="card-trans" id="cardTrans"></div>
        </div>

      </div>

      <!-- video mode — replaces card content -->
      <div class="card-video-mode" id="videoMode">
        <div class="video-player">
          <button class="video-close" onclick="toggleVideo(event)" aria-label="Close video" style="position:absolute;top:10px;right:10px;z-index:3;">&#x2715;</button>
          <video id="cardVideo" controls preload="none" style="width:100%;height:100%;object-fit:contain;display:block;flex:1;">
            <source id="cardVideoSrc" src="" type="video/mp4"/>
          </video>
        </div>
      </div>
    </div>

    <div class="forms-grid" id="formsGrid"></div>

    <div class="controls" id="controls">
      <button class="btn" id="prevBtn" onclick="prev()">&#8592; Prev</button>
      <button class="btn btn-play" id="playBtn" onclick="handlePlayBtn()" aria-label="Play"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></button>
      <button class="btn" id="nextBtn" onclick="next()">Next &#8594;</button>
    </div>

    <div class="auto-box" id="autoBox">
      <div class="set-row">
        <label>Delay per card</label>
        <input type="range" min="1" max="8" step="1" value="3" oninput="setDelay(this.value)"/>
        <span class="set-val" id="delayVal">3s</span>
      </div>
      <div class="set-row">
        <label>Repeat each</label>
        <select onchange="setRep(this.value)">
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="3">3×</option>
          <option value="5">5×</option>
        </select>
      </div>
    </div>

    <div class="done-banner" id="doneBanner">✓ Section complete! Choose next sublevel from the sidebar.</div>

    <!-- QUIZ PANEL -->
    <div class="quiz-wrap" id="quizWrap">
      <div class="quiz-layout">
        <div class="quiz-tracker" id="quizTracker">
          <div class="qt-timeline">
            <div class="qt-line"></div>
            <div class="qt-dots" id="qtDots"></div>
          </div>
          <div class="qt-ends"><span>Q1</span><span id="qtEnd">Q10</span></div>
        </div>
        <div class="quiz-main">
          <div class="quiz-score" id="quizScore">Question 1 of 10</div>

function hideReveal(){
  const rev=document.getElementById('cardReveal');
  if(rev) rev.classList.add('hidden');
}

function scrubToIdx(idx){
  const cards=getCards();
  const newIdx=Math.max(0,Math.min(cards.length-1,idx));
  if(newIdx===curIdx) return;
  stopAudio();
  hideReveal();
  curIdx=newIdx;
  render();
}

function scrubProgress(e){
  const track=document.getElementById('progressTrack');
  const rect=track.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  const cards=getCards();
  scrubToIdx(Math.round(pct*(cards.length-1)));
}

let scrubbing=false;
function startScrub(e){
  scrubbing=true;
  const move=(ev)=>{
    if(!scrubbing) return;
    const clientX=ev.touches?ev.touches[0].clientX:ev.clientX;
    const track=document.getElementById('progressTrack');
    const rect=track.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    const cards=getCards();
    scrubToIdx(Math.round(pct*(cards.length-1)));
  };
  const up=()=>{ scrubbing=false; document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.removeEventListener('touchmove',move); document.removeEventListener('touchend',up); };
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',move);
  document.addEventListener('touchend',up);
}

  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('collapsed');
  ov.classList.toggle('vis',!sb.classList.contains('collapsed'));
}

function updateSidebar(){
  document.querySelectorAll('.section-block').forEach((el,i)=>el.classList.toggle('open',i===curLvl));
  document.querySelectorAll('.sidebar-level').forEach((el,i)=>el.classList.toggle('active',i===curLvl));
  document.querySelectorAll('.sublevel-item').forEach(el=>el.classList.remove('active'));
  const lists=document.querySelectorAll('.sublevel-list');
  if(lists[curLvl]){
    const items=lists[curLvl].querySelectorAll('.sublevel-item');
    if(items[curSub]) items[curSub].classList.add('active');
  }
  const activeLvl=document.querySelectorAll('.sidebar-level')[curLvl];
  if(activeLvl) activeLvl.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
function loadLevel(li,si){
  stopAuto();stopAudio();
  curLvl=li;curSub=si;curIdx=0;
  const lv=LEVELS[li],sl=lv.subs[si];
  document.getElementById('topTitle').textContent=lv.label.replace(/^\d+\.\s*/,'');
  document.getElementById('topDesc').textContent=sl.label+' — '+sl.desc;
  
  updateSidebar();
  const isQuiz=getSL().quiz===true;
  document.getElementById('modeBar').style.display=isQuiz?'none':'flex';
  document.getElementById('quizCountBar').classList.toggle('vis',isQuiz);
  if(isQuiz){buildQuizCountBar();}
  // also stop auto mode when entering quiz
  if(isQuiz){ 
    stopAuto(); 
    mode='seq'; 
    document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===0)); 
    document.getElementById('autoBox').classList.remove('vis');
    updatePlayBtn(); 
  }
  showQuizPanel(isQuiz);
  if(isQuiz){ startQuiz(); return; }
  resetOrder();
  render();
  updatePlayBtn();
}

function getSL(){return LEVELS[curLvl].subs[curSub];}
function getCards(){return getSL().cards;}
function getCard(){return getCards()[order[curIdx]];}

function resetOrder(){
  order=getCards().map((_,i)=>i);
  if(mode==='rand') shuffle(order);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const sl=getSL(),cards=getCards(),card=getCard();
  const total=cards.length;

// Letter positional forms lookup
function getLetterForms(letterAr){
  const l=L.find(x=>x.ar===letterAr);
  return l?l.forms:[letterAr,letterAr,letterAr,letterAr];
}
function getPosForm(letterAr,pos,wordLen){
  const forms=getLetterForms(letterAr);
  // non-connecting letters (alif,dal,dhal,ra,zay,waw) only have isolated/final
  const nonConn=['ا','د','ذ','ر','ز','و'];
  if(nonConn.includes(letterAr)) return pos===wordLen-1?forms[0]:forms[3];
  if(pos===0) return forms[1]; // initial
  if(pos===wordLen-1) return forms[3]; // final
  return forms[2]; // medial
}
function buildDDWord(word){
  // split word into individual letters (skip diacritics/harakat)
  const diacritics=/[ً-ٰٟٱ‌‍]/g;
  const clean=word.replace(diacritics,'');
  const letters=[...clean]; // spread handles multi-codepoint chars
  return letters;
}

function startQuiz(){
  const nLetter=Math.round(QUIZ_TOTAL*0.5);
  const nDD=Math.max(2,Math.round(QUIZ_TOTAL*0.2));
  const nRead=QUIZ_TOTAL-nLetter-nDD;

  const letterPool=L.filter(l=>AUDIO_MAP[l.n]).sort(()=>Math.random()-0.5).slice(0,nLetter);
  const letterQs=letterPool.map(l=>({type:'letter',answer:l,tts:l.ar,label:l.nm}));

  const readPool=[...sect13].filter((_,i)=>i<120).sort(()=>Math.random()-0.5).slice(0,nRead);
  const readQs=readPool.map(w=>({type:'reading',answer:w,tts:w,label:w,readingIdx:sect13.indexOf(w)+1}));

  const ddPool=[...sect13].filter((_,i)=>i<120).filter(w=>{
    const clean=w.replace(/[ً-ٰٟٱ‌‍]/g,'');
    const l=[...clean].length;
    return l>=2&&l<=5;
  }).sort(()=>Math.random()-0.5).slice(0,nDD);
  const ddQs=ddPool.map(w=>({type:'dragdrop',answer:w,tts:w,label:w,readingIdx:sect13.indexOf(w)+1}));

  quizQuestions=[...letterQs,...readQs,...ddQs].sort(()=>Math.random()-0.5);
  quizCurQ=0; quizCorrect=0; quizAnswered=false;
  quizResults=new Array(QUIZ_TOTAL).fill(null);
  quizChosen=new Array(QUIZ_TOTAL).fill(null);
  quizOpts=new Array(QUIZ_TOTAL).fill(null);
  document.getElementById('quizModalOverlay').classList.remove('vis');
  buildTracker();
  renderQuizQ();
}

function buildQuizCountBar(){
  const sel=document.getElementById('qcSelect');
  if(sel) sel.value=QUIZ_TOTAL;
}

function setQuizTotal(n){
  QUIZ_TOTAL=n;
  startQuiz();
}

function buildTracker(){
  const dots=document.getElementById('qtDots');
  if(!dots) return;
  dots.innerHTML='';
  for(let i=0;i<QUIZ_TOTAL;i++){
    const d=document.createElement('div');
    d.className='qt-dot'+(i===0?' current':'');
    d.id='qtc-'+i;
    d.title='Q'+(i+1);
    d.onclick=(()=>{const idx=i;return()=>reviewQuestion(idx);})();
    dots.appendChild(d);
  }
  const end=document.getElementById('qtEnd');
  if(end) end.textContent='Q'+QUIZ_TOTAL;
}

function updateTracker(){
  for(let i=0;i<QUIZ_TOTAL;i++){
    const d=document.getElementById('qtc-'+i);
    if(!d) continue;
    d.className='qt-dot';
    if(i===quizCurQ) d.classList.add('current');
    else if(quizResults[i]===true) d.classList.add('correct');
    else if(quizResults[i]===false) d.classList.add('wrong');
  }
}

function reviewQuestion(idx){
  if(quizResults[idx]===null){
    const nextUnanswered=quizResults.findIndex(r=>r===null);
    if(idx!==nextUnanswered) return;
    quizCurQ=idx;
    quizAnswered=false;
    renderQuizQ();
    updateTracker();
    return;
  }
  quizCurQ=idx;
  quizAnswered=true;
  renderQuizQ();
  setTimeout(()=>{
    const q=quizQuestions[idx];
    const chosen=quizChosen[idx];
    if(q.type==='letter'||q.type==='reading'){
      const grid=document.getElementById('quizGrid');
      if(!grid) return;
      grid.querySelectorAll('.quiz-opt').forEach(b=>{
        b.disabled=true;
        const txt=b.textContent.trim();
        const isCorrect=(q.type==='letter'?txt===q.answer.ar:txt===q.answer);
        const wasChosen=chosen&&txt===chosen;
        if(isCorrect) b.classList.add('reveal');
        if(wasChosen&&!isCorrect) b.classList.add('wrong');
        if(wasChosen&&isCorrect) b.classList.add('correct');
      });
    }
  },150);
}

function renderQuizQ(){
  const q=quizQuestions[quizCurQ];
  quizLetter=q;
  quizAnswered=false;
  document.getElementById('quizScore').textContent='Question '+(quizCurQ+1)+' of '+QUIZ_TOTAL+' • '+quizCorrect+' correct';
  document.getElementById('quizListenBtn').classList.remove('playing');
  updateTracker();

  const grid=document.getElementById('quizGrid');
  const ddWrap=document.getElementById('ddWrap');
  grid.style.display=q.type==='dragdrop'?'none':'grid';
  ddWrap.style.display=q.type==='dragdrop'?'flex':'none';

  if(q.type==='dragdrop'){
    renderDragDrop(q);
    setTimeout(()=>quizPlay(),300);
    return;
  }

  grid.innerHTML='';

  if(q.type==='letter'){
    if(!quizOpts[quizCurQ]){
      const pool=L.filter(l=>l.n!==q.answer.n);
      const wrong=[...pool].sort(()=>Math.random()-0.5).slice(0,3);
      quizOpts[quizCurQ]=[{ar:q.answer.ar,id:q.answer.n},...wrong.map(l=>({ar:l.ar,id:l.n}))].sort(()=>Math.random()-0.5);
    }
    const savedOpts=quizOpts[quizCurQ];
    savedOpts.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='quiz-opt';
      btn.textContent=opt.ar;
      btn.onclick=()=>quizAnswer(btn,opt.id===q.answer.n,savedOpts.map(o=>o.id===q.answer.n),btn);
      grid.appendChild(btn);
    });
  } else {
    if(!quizOpts[quizCurQ]){
      const pool=[...sect13].filter(w=>w!==q.answer).sort(()=>Math.random()-0.5).slice(0,3);
      quizOpts[quizCurQ]=[q.answer,...pool].sort(()=>Math.random()-0.5);
    }
    const savedOpts=quizOpts[quizCurQ];
    savedOpts.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='quiz-opt';
      btn.style.fontSize='32px';
      btn.textContent=opt;
      btn.onclick=()=>quizAnswer(btn,opt===q.answer,savedOpts.map(o=>o===q.answer),btn);
      grid.appendChild(btn);
    });
  }

  setTimeout(()=>quizPlay(),300);
}


function quizPlay(){
  const btn=document.getElementById('quizListenBtn');
  if(!quizLetter) return;
  btn.classList.add('playing');
  const q=quizLetter;
  if(q.type==='letter'&&AUDIO_MAP[q.answer.n]){
    // isolated letter — use MP3
    const a=new Audio('audio/'+AUDIO_MAP[q.answer.n]);
    a.play().catch(()=>{btn.classList.remove('playing');ttsTxt(q.answer.ar);});
    a.onended=()=>btn.classList.remove('playing');
    a.onerror=()=>{btn.classList.remove('playing');ttsTxt(q.answer.ar);};
  } else if((q.type==='reading'||q.type==='dragdrop')&&q.readingIdx&&READING_MAP[q.readingIdx]){
    // reading practice or drag-drop word — use reading MP3
    const a=new Audio('reading/'+READING_MAP[q.readingIdx]);
    a.play().catch(()=>{btn.classList.remove('playing');ttsTxt(q.tts);});
    a.onended=()=>btn.classList.remove('playing');
    a.onerror=()=>{btn.classList.remove('playing');ttsTxt(q.tts);};
  } else {
    ttsTxt(q.tts);
    btn.classList.remove('playing');
  }
}

function playCorrectSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[261,0],[329,0.1],[392,0.2]].forEach(([freq,offset])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(freq,ctx.currentTime+offset);
      g.gain.setValueAtTime(0,ctx.currentTime+offset);
      g.gain.linearRampToValueAtTime(0.12,ctx.currentTime+offset+0.025);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+offset+0.7);
      o.start(ctx.currentTime+offset);o.stop(ctx.currentTime+offset+0.75);
    });
  }catch(e){}
}

function playWrongSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[300,0],[240,0.16]].forEach(([freq,offset])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(freq,ctx.currentTime+offset);
      g.gain.setValueAtTime(0,ctx.currentTime+offset);
      g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+offset+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+offset+0.3);
      o.start(ctx.currentTime+offset);o.stop(ctx.currentTime+offset+0.34);
    });
  }catch(e){}
}

function ttsTxt(txt){
  if(!('speechSynthesis'in window))return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(txt);
  utt.lang='ar-SA';utt.rate=0.75;
  const voices=window.speechSynthesis.getVoices();
  const arV=voices.find(v=>v.lang.startsWith('ar'));
  if(arV)utt.voice=arV;
  window.speechSynthesis.speak(utt);
}

function quizAnswer(btnEl, isCorrect, correctMask, _unused){
  if(quizAnswered) return;
  quizAnswered=true;
  if(isCorrect){ quizCorrect++; playCorrectSound(); }
  else{ playWrongSound(); }

  quizResults[quizCurQ]=isCorrect;
  quizChosen[quizCurQ]=btnEl.textContent.trim();
  document.getElementById('quizScore').textContent='Question '+(quizCurQ+1)+' of '+QUIZ_TOTAL+' • '+quizCorrect+' correct';
  updateTracker();

  const grid=document.getElementById('quizGrid');
  const btns=grid.querySelectorAll('.quiz-opt');
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(b===btnEl) b.classList.add(isCorrect?'correct':'wrong');
    if(correctMask[i]) b.classList.add('reveal');
  });

  setTimeout(()=>{
    quizCurQ++;
    if(quizCurQ<QUIZ_TOTAL){ renderQuizQ(); }
    else{ showQuizResult(); }
  },900);
}


function renderDragDrop(q){
  const letters=buildDDWord(q.answer);
  const zones=document.getElementById('ddZones');
  const tiles=document.getElementById('ddTiles');
  zones.innerHTML=''; tiles.innerHTML='';

  // Create drop zones (RTL order, one per letter)
  const posLabels=['1st','2nd','3rd','4th','5th'];
  letters.forEach((l,i)=>{
    const zone=document.createElement('div');
    zone.className='dd-zone';
    zone.dataset.idx=i;
    zone.dataset.correct=l;
    zone.dataset.posForm=getPosForm(l,i,letters.length);
    const lbl=document.createElement('span');
    lbl.className='zone-label';
    lbl.textContent=posLabels[i]||'';
    zone.appendChild(lbl);
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();
      zone.classList.remove('over');
      const tileId=e.dataTransfer.getData('tileId');
      const tile=document.getElementById(tileId);
      if(!tile||zone.dataset.filled) return;
      const dropped=tile.dataset.letter;
      const correct=zone.dataset.correct;
      if(dropped===correct){
        zone.textContent=zone.dataset.posForm;
        zone.classList.add('correct');
        zone.dataset.filled='1';
        tile.classList.add('used');
        playCorrectSound();
        checkDDComplete(q,letters);
      } else {
        zone.classList.add('wrong');
        playWrongSound();
        setTimeout(()=>zone.classList.remove('wrong'),600);
      }
    });
    zones.appendChild(zone);
  });

  // Create tiles — correct letters + 2 decoy letters, shuffled
  const allLetters=L.map(l=>l.ar);
  const decoys=allLetters.filter(l=>!letters.includes(l)).sort(()=>Math.random()-0.5).slice(0,2);
  const tileLetters=[...letters,...decoys].sort(()=>Math.random()-0.5);

  tileLetters.forEach((l,i)=>{
    const tile=document.createElement('div');
    const id='tile-'+i;
    tile.id=id; tile.className='dd-tile';
    tile.textContent=l;
    tile.draggable=true;
    tile.dataset.letter=l;
    // Mouse drag
    tile.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('tileId',id);
      tile.classList.add('dragging');
    });
    tile.addEventListener('dragend',()=>tile.classList.remove('dragging'));

    // Touch drag
    tile.addEventListener('touchstart',e=>{
      e.preventDefault();
      tile.classList.add('dragging');
      const t=e.touches[0];
      tile._clone=tile.cloneNode(true);
      tile._clone.style.cssText='position:fixed;opacity:0.85;pointer-events:none;z-index:9999;width:'+tile.offsetWidth+'px;height:'+tile.offsetHeight+'px;display:flex;align-items:center;justify-content:center;font-family:Scheherazade New,serif;font-size:36px;direction:rtl;background:var(--white);border:2px solid var(--blue);border-radius:8px;';
      tile._clone.textContent=l;
      document.body.appendChild(tile._clone);
      tile._clone.style.left=(t.clientX-tile.offsetWidth/2)+'px';
      tile._clone.style.top=(t.clientY-tile.offsetHeight/2)+'px';
    },{passive:false});

    tile.addEventListener('touchmove',e=>{
      e.preventDefault();
      const t=e.touches[0];
      if(tile._clone){
        tile._clone.style.left=(t.clientX-tile._clone.offsetWidth/2)+'px';
        tile._clone.style.top=(t.clientY-tile._clone.offsetHeight/2)+'px';
      }
      document.querySelectorAll('.dd-zone').forEach(z=>z.classList.remove('over'));
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const zone=el&&el.closest('.dd-zone');
      if(zone&&!zone.dataset.filled) zone.classList.add('over');
    },{passive:false});

    tile.addEventListener('touchend',e=>{
      e.preventDefault();
      tile.classList.remove('dragging');
      if(tile._clone){document.body.removeChild(tile._clone);tile._clone=null;}
      const t=e.changedTouches[0];
      document.querySelectorAll('.dd-zone').forEach(z=>z.classList.remove('over'));
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const zone=el&&el.closest('.dd-zone');
      if(!zone||zone.dataset.filled) return;
      const dropped=tile.dataset.letter;
      const correct=zone.dataset.correct;
      if(dropped===correct){
        zone.textContent=zone.dataset.posForm;
        zone.classList.add('correct');
        zone.dataset.filled='1';
        tile.classList.add('used');
        playCorrectSound();
        checkDDComplete(quizLetter,buildDDWord(quizLetter.answer));
      } else {
        zone.classList.add('wrong');
        playWrongSound();
        setTimeout(()=>zone.classList.remove('wrong'),600);
      }
    },{passive:false});

    tiles.appendChild(tile);
  });
}

function checkDDComplete(q,letters){
  const zones=document.getElementById('ddZones').querySelectorAll('.dd-zone');
  const filled=[...zones].filter(z=>z.dataset.filled).length;
  if(filled===letters.length){
    quizCorrect++;
    quizResults[quizCurQ]=true;
    document.getElementById('quizScore').textContent='Question '+(quizCurQ+1)+' of '+QUIZ_TOTAL+'  \u2022  '+quizCorrect+' correct';
    updateTracker();
    setTimeout(()=>{
      quizCurQ++;
      if(quizCurQ<QUIZ_TOTAL){ renderQuizQ(); }
      else{ showQuizResult(); }
    },900);
  }
}

function closeQuizModal(){
  document.getElementById('quizModalOverlay').classList.remove('vis');
}

function showQuizResult(){
  const pct=quizCorrect/QUIZ_TOTAL;
  const passed=pct>=QUIZ_PASS;
  const modal=document.getElementById('quizModal');
  modal.className='quiz-modal'+(passed?' pass':' fail');
  document.getElementById('quizModalScore').textContent=quizCorrect+' / '+QUIZ_TOTAL;
  document.getElementById('quizModalTitle').textContent=passed?'You passed!':'Try again';
  document.getElementById('quizModalMsg').textContent=passed?'Great work — section complete!':'';
  document.getElementById('quizTryAgainBtn').style.display=passed?'none':'block';
  document.getElementById('quizModalOverlay').classList.add('vis');
  if(passed){
    saveQuizPass('s14');
    buildSidebar();
    updateSidebar();
    launchConfetti();
  }
}


function showQuizPanel(show){
  document.getElementById('quizWrap').classList.toggle('vis',show);
  document.getElementById('card').style.display=show?'none':'flex';
  document.getElementById('formsGrid').style.display=show?'none':'grid';
  document.getElementById('controls').style.display=show?'none':'flex';
  document.getElementById('pFill').parentElement.parentElement.style.display=show?'none':'flex';
  document.getElementById('doneBanner').style.display=show?'none':'';
}

window.speechSynthesis&&window.speechSynthesis.getVoices();
buildSidebar();
loadLevel(0,0);
</script>

<canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;"></canvas>

<script>
// ── CONFETTI ────────────────────────────────────────────────────────────────
(function(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  let pieces=[];
  let animId=null;
  const COLORS=['#e67e22','#2980b9','#27ae60','#f1c40f','#e74c3c','#9b59b6','#1abc9c','#fff'];

  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);

  // V-shape fan from bottom center — wide upward cone, all from one point
  function burst(x, y, count){
    count = count||160;
    for(let i=0;i<count;i++){
      // spread across a wide V: from ~-20deg to ~-160deg (all upward, fan shape)
      const t = i / count;
      const angle = -Math.PI + t * Math.PI + (Math.random()-0.5)*0.15;
      const speed = Math.random()*24+12;
      pieces.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        w: Math.random()*16+8,
        h: Math.random()*7+4,
        color: COLORS[Math.floor(Math.random()*COLORS.length)],
        tiltAngle: Math.random()*Math.PI*2,
        tiltSpeed: (Math.random()-0.5)*0.35,
        gravity: 0.55,
        life: 1,
        decay: Math.random()*0.006+0.003,
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();
      ctx.globalAlpha=p.life;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.tiltAngle);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
  }

  function update(){
    pieces.forEach(p=>{
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=p.gravity; // gravity pulls down
      p.vx*=0.98;      // slight air resistance
      p.tiltAngle+=p.tiltSpeed;
      p.life-=p.decay;
    });
    pieces=pieces.filter(p=>p.life>0);
  }

  function loop(){
    draw();update();
    if(pieces.length>0){animId=requestAnimationFrame(loop);}
    else{canvas.style.display='none';}
  }

  window.launchConfetti=function(){
    resize();
    canvas.style.display='block';
    pieces=[];
    if(animId) cancelAnimationFrame(animId);
    const x=canvas.width*0.5;
    const y=canvas.height;
    // stagger into 3 small waves so it doesn't all explode at once
    burst(x, y, 50);
    setTimeout(()=>burst(x, y, 40), 120);

    loop();
  };
})();
</script>
