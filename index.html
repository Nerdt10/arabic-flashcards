<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arabic Reading Proficiency</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#2980b9;
  --blue-dark:#1a5f8a;
  --blue-light:#e8f2fa;
  --orange:#e67e22;
  --orange-dark:#c0392b;
  --orange-light:#fdebd0;
  --white:#ffffff;
  --offwhite:#f5f5f0;
  --text:#1a1a2e;
  --text2:#666;
  --text3:#aaa;
  --border:#e0e0e0;
  --sidebar-w:220px;
}
body{font-family:'Cairo',sans-serif;background:var(--offwhite);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--blue-dark);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:width 0.25s ease,min-width 0.25s ease;}
.sidebar.collapsed{width:0;min-width:0;overflow:hidden;}
.sidebar-logo{background:var(--blue);padding:16px 14px;border-bottom:3px solid var(--orange);white-space:nowrap;}
.sidebar-logo h1{font-size:0.85rem;font-weight:700;color:#fff;line-height:1.3;}
.sidebar-logo p{font-size:0.7rem;color:rgba(255,255,255,0.7);margin-top:2px;}
.sidebar-level{display:flex;align-items:stretch;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.08);white-space:nowrap;}
.sidebar-level.active{background:var(--blue);}
.sidebar-level:hover:not(.active){background:rgba(255,255,255,0.08);}
.level-num{width:36px;min-width:36px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;flex-shrink:0;}
.sidebar-level.active .level-num{background:var(--orange-dark);}
.level-text{padding:10px 10px 10px 12px;flex:1;}
.level-text span{display:block;font-size:0.78rem;font-weight:600;color:#fff;line-height:1.3;}
.level-text small{display:block;font-size:0.65rem;color:rgba(255,255,255,0.6);margin-top:2px;}
.sublevel-list{background:rgba(0,0,0,0.2);display:none;}
.sidebar-level.active+.sublevel-list{display:block;}
.sublevel-item{display:block;padding:8px 12px 8px 48px;font-size:0.72rem;color:rgba(255,255,255,0.75);cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.12s;white-space:nowrap;}
.sublevel-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
.sublevel-item.active{color:var(--orange);font-weight:600;}

/* HAMBURGER */
.hamburger{background:none;border:none;cursor:pointer;padding:6px 8px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;align-items:center;justify-content:center;}
.hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;transition:background 0.15s;}
.hamburger:hover span{background:var(--blue);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto;align-items:center;}

/* TOPBAR */
.topbar{width:100%;background:var(--white);border-bottom:2px solid var(--orange);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-title{flex:1;text-align:center;}
.topbar-title h2{font-size:1rem;font-weight:700;color:var(--text);}
.topbar-title p{font-size:0.72rem;color:var(--text2);margin-top:1px;}

/* CONTENT */
.content-area{width:100%;max-width:520px;padding:20px 16px 40px;display:flex;flex-direction:column;gap:14px;align-items:center;}

/* INFO */
.info-label{font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.04em;text-transform:uppercase;align-self:flex-start;}

/* MODE BAR */
.mode-bar{display:flex;gap:0;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;width:100%;}
.mode-btn{flex:1;padding:7px 0;border:none;border-right:1.5px solid var(--border);background:var(--white);font-family:'Cairo',sans-serif;font-size:0.78rem;font-weight:600;color:var(--text2);cursor:pointer;transition:background 0.15s,color 0.15s;}
.mode-btn:last-child{border-right:none;}
.mode-btn.active{background:var(--blue);color:#fff;}
.mode-btn:hover:not(.active){background:var(--blue-light);color:var(--blue-dark);}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:10px;width:100%;}
.progress-track{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--orange);border-radius:99px;transition:width 0.35s ease;}
.progress-label{font-size:0.75rem;color:var(--text2);min-width:46px;text-align:right;font-weight:600;}

/* FLASHCARD */
.flashcard{background:var(--white);border:1.5px solid var(--border);border-radius:10px;width:100%;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:1.8rem 1.5rem 1.5rem;cursor:pointer;position:relative;transition:border-color 0.2s,box-shadow 0.2s;user-select:none;}
.flashcard:hover{border-color:var(--blue-dark);box-shadow:0 2px 12px rgba(41,128,185,0.08);}
.flashcard:active{transform:scale(0.99);}
.flashcard.playing{border-color:var(--orange);box-shadow:0 0 0 3px rgba(230,126,34,0.12);}
.card-badge{position:absolute;top:10px;left:10px;background:var(--orange);color:#fff;font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:3px;}
.card-arabic{font-family:'Scheherazade New',serif;font-size:96px;line-height:1.1;color:var(--text);direction:rtl;text-align:center;transition:opacity 0.15s;}
.card-arabic.sm{font-size:64px;}
.card-arabic.xs{font-size:44px;}
.card-arabic.xxs{font-size:32px;}
.card-reveal{transition:opacity 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.card-reveal.hidden{opacity:0;pointer-events:none;}
.card-name{font-size:1.1rem;font-weight:700;color:var(--blue-dark);text-align:center;}
.card-trans{font-size:0.82rem;color:var(--text2);text-align:center;}
.card-hint{position:absolute;bottom:10px;right:14px;font-size:0.7rem;color:var(--text3);display:flex;align-items:center;gap:4px;}
.card-parts{display:flex;gap:14px;direction:rtl;flex-wrap:wrap;justify-content:center;}

/* FORMS GRID — clickable */
.forms-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;}
.form-cell{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.form-cell:hover:not(.hl){border-color:var(--blue);background:var(--blue-light);}
.form-cell.hl{background:var(--blue-light);border-color:var(--blue);border-width:2px;}
.form-cell.hl .form-arabic{color:var(--blue-dark);}
.form-cell.hl .form-label{color:var(--blue-dark);font-weight:600;}
.form-arabic{font-family:'Scheherazade New',serif;font-size:28px;color:var(--text);direction:rtl;}
.form-label{font-size:0.62rem;color:var(--text2);text-align:center;}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:10px;justify-content:center;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 20px;border:1.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);font-family:'Cairo',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn:hover{border-color:var(--blue);color:var(--blue);}
.btn:active{transform:scale(0.96);}
.btn:disabled{opacity:0.3;cursor:default;}
.btn-play{width:48px;height:48px;padding:0;border-radius:50%;background:var(--orange);border-color:var(--orange);color:#fff;font-size:1rem;}
.btn-play:hover{background:var(--orange-dark);border-color:var(--orange-dark);color:#fff;}

/* AUTO SETTINGS */
.auto-box{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;display:none;flex-direction:column;gap:10px;width:100%;}
.auto-box.vis{display:flex;}
.set-row{display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--text2);}
.set-row label{min-width:100px;font-weight:600;}
.set-row input[type=range]{flex:1;accent-color:var(--orange);}
.set-row select{padding:4px 8px;border:1.5px solid var(--border);border-radius:4px;background:var(--offwhite);font-family:'Cairo',sans-serif;font-size:0.8rem;color:var(--text);}
.set-val{min-width:28px;text-align:right;font-weight:700;color:var(--blue-dark);}

/* DONE */
.done-banner{background:#eafaf1;border:1.5px solid #27ae60;border-radius:8px;padding:12px 16px;text-align:center;font-size:0.88rem;color:#1e8449;font-weight:700;display:none;width:100%;}
.done-banner.vis{display:block;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title">
      <h2 id="topTitle">1. Alphabet</h2>
      <p id="topDesc">The Alphabet — All 28 letters — isolated form</p>
    </div>
    <div style="width:36px;flex-shrink:0;"></div>
  </div>

  <div class="content-area">
    <div class="mode-bar">
      <button class="mode-btn active" onclick="setMode('seq',this)">In order</button>
      <button class="mode-btn" onclick="setMode('rand',this)">Random</button>
      <button class="mode-btn" onclick="setMode('auto',this)">Auto-play</button>
    </div>

    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
      <span class="progress-label" id="pLabel">1 / 1</span>
    </div>

    <div class="flashcard" id="card" onclick="handleClick()">
      <div class="card-badge" id="cardBadge"></div>
      <div class="card-arabic" id="cardAr"></div>
      <div class="card-reveal hidden" id="cardReveal">
        <div class="card-parts" id="cardParts"></div>
        <div class="card-name" id="cardName"></div>
        <div class="card-trans" id="cardTrans"></div>
      </div>
      <div class="card-hint" id="cardHint">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        tap to hear
      </div>
    </div>

    <div class="forms-grid" id="formsGrid"></div>

    <div class="controls">
      <button class="btn" id="prevBtn" onclick="prev()">&#8592; Prev</button>
      <button class="btn btn-play" onclick="playAudio()" aria-label="Play">&#9654;</button>
      <button class="btn" id="nextBtn" onclick="next()">Next &#8594;</button>
    </div>

    <div class="auto-box" id="autoBox">
      <div class="set-row">
        <label>Delay per card</label>
        <input type="range" min="1" max="8" step="1" value="3" oninput="setDelay(this.value)"/>
        <span class="set-val" id="delayVal">3s</span>
      </div>
      <div class="set-row">
        <label>Repeat each</label>
        <select onchange="setRep(this.value)">
          <option value="1">1×</option>
          <option value="2">2×</option>
          <option value="3" selected>3×</option>
          <option value="5">5×</option>
        </select>
      </div>
    </div>

    <div class="done-banner" id="doneBanner">✓ Section complete! Choose next sublevel from the sidebar.</div>
  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────

const L = [ // 28 letters
  {n:1,ar:'ا',nm:'Alif',tr:'vowel carrier',forms:['ا','ا','ا','ا']},
  {n:2,ar:'ب',nm:'Ba',tr:'/ b / — "b" in boy',forms:['ب','بـ','ـبـ','ـب']},
  {n:3,ar:'ت',nm:'Ta',tr:'/ t / — "t" in top',forms:['ت','تـ','ـتـ','ـت']},
  {n:4,ar:'ث',nm:'Tha',tr:'/ θ / — "th" in three',forms:['ث','ثـ','ـثـ','ـث']},
  {n:5,ar:'ج',nm:'Jim',tr:'/ dʒ / — "j" in jam',forms:['ج','جـ','ـجـ','ـج']},
  {n:6,ar:'ح',nm:'Ha',tr:'/ ħ / — breathy "h"',forms:['ح','حـ','ـحـ','ـح']},
  {n:7,ar:'خ',nm:'Kha',tr:'/ x / — "ch" in Bach',forms:['خ','خـ','ـخـ','ـخ']},
  {n:8,ar:'د',nm:'Dal',tr:'/ d / — "d" in dog',forms:['د','د','ـد','ـد']},
  {n:9,ar:'ذ',nm:'Dhal',tr:'/ ð / — "th" in the',forms:['ذ','ذ','ـذ','ـذ']},
  {n:10,ar:'ر',nm:'Ra',tr:'/ r / — rolled "r"',forms:['ر','ر','ـر','ـر']},
  {n:11,ar:'ز',nm:'Zay',tr:'/ z / — "z" in zoo',forms:['ز','ز','ـز','ـز']},
  {n:12,ar:'س',nm:'Sin',tr:'/ s / — "s" in sun',forms:['س','سـ','ـسـ','ـس']},
  {n:13,ar:'ش',nm:'Shin',tr:'/ ʃ / — "sh" in shoe',forms:['ش','شـ','ـشـ','ـش']},
  {n:14,ar:'ص',nm:'Sad',tr:'/ sˤ / — heavy "s"',forms:['ص','صـ','ـصـ','ـص']},
  {n:15,ar:'ض',nm:'Dad',tr:'/ dˤ / — heavy "d"',forms:['ض','ضـ','ـضـ','ـض']},
  {n:16,ar:'ط',nm:'Ta (heavy)',tr:'/ tˤ / — heavy "t"',forms:['ط','طـ','ـطـ','ـط']},
  {n:17,ar:'ظ',nm:'Dha',tr:'/ ðˤ / — heavy "dh"',forms:['ظ','ظـ','ـظـ','ـظ']},
  {n:18,ar:'ع',nm:'Ayn',tr:'/ ʕ / — pharyngeal',forms:['ع','عـ','ـعـ','ـع']},
  {n:19,ar:'غ',nm:'Ghayn',tr:'/ ɣ / — French "r"',forms:['غ','غـ','ـغـ','ـغ']},
  {n:20,ar:'ف',nm:'Fa',tr:'/ f / — "f" in fan',forms:['ف','فـ','ـفـ','ـف']},
  {n:21,ar:'ق',nm:'Qaf',tr:'/ q / — deep "k"',forms:['ق','قـ','ـقـ','ـق']},
  {n:22,ar:'ك',nm:'Kaf',tr:'/ k / — "k" in kite',forms:['ك','كـ','ـكـ','ـك']},
  {n:23,ar:'ل',nm:'Lam',tr:'/ l / — "l" in lamp',forms:['ل','لـ','ـلـ','ـل']},
  {n:24,ar:'م',nm:'Mim',tr:'/ m / — "m" in moon',forms:['م','مـ','ـمـ','ـم']},
  {n:25,ar:'ن',nm:'Nun',tr:'/ n / — "n" in noon',forms:['ن','نـ','ـنـ','ـن']},
  {n:26,ar:'ه',nm:'Ha',tr:'/ h / — "h" in hat',forms:['ه','هـ','ـهـ','ـه']},
  {n:27,ar:'و',nm:'Waw',tr:'/ w / or / uː /',forms:['و','و','ـو','ـو']},
  {n:28,ar:'ي',nm:'Ya',tr:'/ j / or / iː /',forms:['ي','يـ','ـيـ','ـي']},
];

// Section 1.3 — Letter Recognition Practice words from PDF
const sect13 = [
  'با','نا','تا','يا','ثت','تث','ثا','جا','حا','خا','سا','شا',
  'صا','ضا','طا','ظا','ما','ها','كب','بك','كت','تك','كس','سك',
  'لث','طف','بل','سل','ضل','فل','عل','طن','نط','فن','نف','بد',
  'يد','جد','حد','خد','غد','بر','يز','جر','حز','طر','بم','نم',
  'شم','صم','يم','لج','عج','حج','بع','يغ','بص','نص','قض','بس',
  'يس','قق','شق','لك','فك','كف','قك','كق','كو','وك','ول','لو',
  'بة','نة','تة','بلب','بعد','عبد','لهب','يهب','ثمن','فيه','خلق','فلق',
  'رغد','وعد','وجد','بلغ','سمع','غري','غرب','عرش','حرش','مطر','شكر','ظلل',
  'بسم','اهلل','اللهم','هلل','هل','لهم','فتح','نعبد','مكر','نستعني',
  'محن','محد','محا','محو','حبمد','حممد'
];

// Section 2: Short vowels — all letters with each vowel
function vCards(vAr,vNm,vTr){
  return L.map(l=>({ar:l.ar+vAr,nm:l.nm+' + '+vNm,tr:vTr,tts:l.ar+vAr,parts:[{ar:vAr,lb:vNm},{ar:l.ar,lb:l.nm}]}));
}
// Section 2.4 reading practice words (from PDF pages 19-20)
const sect24 = [
  'تَزِدُ','رُسُلُ','صُحُفُ','قُرِئَ','قُدِرَ','عُقِدِ','رُسُلِ','غُفِرَ',
  'ظُلِمَ','سُقِطَ','ذُكِرَ','عُفِيَ','يَرِثُ','حُشِرَ','أَمِنَ','وُجِدَ',
  'وُعِدَ','يَدِيَ','لَهُوَ','يَضَعُ','صَدَقَ','أَعِظُ','تُطِعُ','خُلُقُ',
  'مَطَرُ','شِيَةَ','نَرِثُ','بَجَلَ','عِوَجَ','يَلِجُ','فُعِلَ','يُطِعُ',
  'تَجِدُ','صُحُفِ','قُتِلَ','أُذُنُ','يَهَبُ','تَذَرُ','مَثَلُ','حَمِدَ',
  'يَعِدُ','عُرِضَ','غَنَمُ','يَصِلُ','سَقَرُ','دُعِيَ','يَجِدُ','سَمِعَ',
  'هُدِيَ','قَبِلَ','أَجِدُ','ذُكِرَ','ذَهَبَ','هَدَشَ','حَسَنَ','مَثَلَ',
  'خَلَقَ','وَسَلَكَ','فَجَمَعَ','وَجَمَعَ','فَصَرَفَ','فَوَقَعَ',
  'فَبَدَأَ','فَمَكَثَ','فَأَكَلَ','وَجَعَلَ','فَعَدَلَكَ','وَوَجَدَكَ'
];

// Section 3: Tanween
function tCards(vAr,vNm,vTr){
  return L.map(l=>({ar:l.ar+vAr,nm:l.nm+' + '+vNm,tr:vTr,tts:l.ar+vAr,parts:[{ar:vAr,lb:vNm},{ar:l.ar,lb:l.nm}]}));
}
// Tanween reading practice (from PDF pages 25-26)
const sect34 = [
  'كَبِدٍ','إِذًا','يَدٍ','غُرُفٌ','نَصَبٌ','نَفَرٌ','حَسَنًا','مَثَلًا',
  'عُرُبًا','مَرَضًا','نَفَرٌ','جُرُفٍ','سِنَةٌ','ظُلَلٌ','لُبَدًا','عَمَدٍ',
  'كَذِبًا','بِدَمٍ','عَمَدٍ','نُزُلًا','بَشَرًا','زُمَرًا','جَبَلٍ','مَلَأٌ',
  'لَهَبٍ','سُنَنٌ','سَكَنٌ','قَسَمٌ','عَجَبًا','أُكُلٍ','جُرُزًا','هُزُوًا',
  'ثَمَنًا','نَفَرٌ','حَمَلًا','نِيَا','خُلُقٍ','قُبُلٍ','ظُفُرٍ','حُمُرٌ',
  'دُبُرٍ','وَدِيَةٌ','فَدِيَةٌ','أَخٌ','بِأَخٍ','أُمَمٍ','بَلَدًا','جَنَفًا',
  'فِئَةٌ','وَجِلَةٌ','رَجُلٌ','فَرَجُلٍ','سُرُورٌ','رُسُلٌ','وَلَدٌ','قَسَمٌ',
  'جُدَدٌ','أُذُنٌ','مَرَضٌ','رَجُلٌ','حَسَنَةٌ','قَتَرَةٌ','غَبَرَةٌ','بَقَرَةٌ'
];

// Section 5: Sukoon reading practice (from PDF pages 30-31, 36)
function sukCards(){
  return L.slice(0,20).map(l=>({ar:l.ar+'\u0652',nm:l.nm+' + Sukoon',tr:'no vowel — stop sound',tts:l.ar,parts:[{ar:'ْ',lb:'Sukoon'},{ar:l.ar,lb:l.nm}]}));
}
function shaddahCards(){
  return L.slice(0,20).map(l=>({ar:l.ar+'\u0651',nm:l.nm+' + Shaddah',tr:'doubled / stressed',tts:l.ar+l.ar,parts:[{ar:'ّ',lb:'Shaddah'},{ar:l.ar,lb:l.nm}]}));
}
function wawLeenCards(){
  return L.slice(0,15).map(l=>({ar:l.ar+'\u064E\u0648\u0652',nm:l.nm+' + Waw Leen',tr:'soft "ow" glide',tts:l.ar+'و',parts:[{ar:'\u0648\u0652',lb:'Waw Leen'},{ar:l.ar,lb:l.nm}],sz:'sm'}));

let curLvl=0,curSub=0,curIdx=0,mode='seq',order=[],autoTimer=null,autoDelay=3000,rep=3,autoReps=0,curAudio=null;

// ── SIDEBAR BUILD ─────────────────────────────────────────────────────────────
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML=`<div class="sidebar-logo"><h1>Arabic Reading Proficiency</h1><p>Ijaada Institute Course</p></div>`;
  LEVELS.forEach((lv,li)=>{
    const lDiv=document.createElement('div');
    lDiv.className='sidebar-level'+(li===0?' active':'');
    lDiv.innerHTML=`<div class="level-num">${li+1}</div><div class="level-text"><span>${lv.label}</span><small>${lv.desc}</small></div>`;
    lDiv.onclick=()=>{loadLevel(li,0);};
    sb.appendChild(lDiv);
    const slDiv=document.createElement('div');
    slDiv.className='sublevel-list';
    lv.subs.forEach((sl,si)=>{
      const a=document.createElement('div');
      a.className='sublevel-item'+(li===0&&si===0?' active':'');
      a.textContent=sl.label;
      a.onclick=(e)=>{e.stopPropagation();loadLevel(li,si);};
      slDiv.appendChild(a);
    });
    sb.appendChild(slDiv);
  });
}

function updateSidebar(){
  document.querySelectorAll('.sidebar-level').forEach((el,i)=>el.classList.toggle('active',i===curLvl));
  document.querySelectorAll('.sublevel-item').forEach(el=>el.classList.remove('active'));
  const lists=document.querySelectorAll('.sublevel-list');
  if(lists[curLvl]){
    const items=lists[curLvl].querySelectorAll('.sublevel-item');
    if(items[curSub]) items[curSub].classList.add('active');
  }
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
function loadLevel(li,si){
  stopAuto();stopAudio();
  curLvl=li;curSub=si;curIdx=0;
  const lv=LEVELS[li],sl=lv.subs[si];
  document.getElementById('topTitle').textContent=lv.label;
  document.getElementById('topDesc').textContent=sl.badge+' — '+sl.label+': '+sl.desc;
  
  updateSidebar();
  resetOrder();
  render();
  if(mode==='auto'){playAudio();startAuto();}
}

function getSL(){return LEVELS[curLvl].subs[curSub];}
function getCards(){return getSL().cards;}
function getCard(){return getCards()[order[curIdx]];}

function resetOrder(){
  order=getCards().map((_,i)=>i);
  if(mode==='rand') shuffle(order);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const sl=getSL(),cards=getCards(),card=getCard();
  const total=cards.length;
  document.getElementById('pFill').style.width=((curIdx+1)/total*100)+'%';
  document.getElementById('pLabel').textContent=(curIdx+1)+' / '+total;
  document.getElementById('prevBtn').disabled=curIdx===0;
  document.getElementById('doneBanner').classList.remove('vis');

  // badge
  const badge=document.getElementById('cardBadge');
  badge.textContent=sl.badge||'';
  badge.style.display=sl.badge?'block':'none';

  // arabic
  const arEl=document.getElementById('cardAr');
  arEl.textContent=card.ar||'';
  arEl.className='card-arabic'+(card.sz?' '+card.sz:'');

  // parts
  const partsEl=document.getElementById('cardParts');
  partsEl.innerHTML='';
  if(card.parts){card.parts.forEach(p=>{const d=document.createElement('div');d.className='card-part';d.innerHTML=`<span class="card-part-ar">${p.ar}</span><span class="card-part-label">${p.lb}</span>`;partsEl.appendChild(d);});}

  // name + trans
  document.getElementById('cardName').textContent=sl.reading?'':( card.nm||'');
  document.getElementById('cardTrans').textContent=sl.reading?'tap to hear':( card.tr||'');

  // reset reveal
  const rev=document.getElementById('cardReveal');
  const hint=document.getElementById('cardHint');
  if(sl.reading){
    rev.classList.remove('hidden');
    hint.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> tap to hear';
  } else {
    rev.classList.add('hidden');
    hint.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> tap to hear';
  }

  // forms grid
  const grid=document.getElementById('formsGrid');
  grid.innerHTML='';
  if(sl.showForms&&card.forms){
    ['isolated','initial','medial','final'].forEach((lb,i)=>{
      const c=document.createElement('div');
      c.className='form-cell'+(i===0?' hl':'');
      c.innerHTML=`<span class="form-arabic">${card.forms[i]}</span><span class="form-label">${lb}</span>`;
      c.onclick=(e)=>{
        e.stopPropagation();
        // update big card letter
        document.getElementById('cardAr').textContent=card.forms[i];
        // highlight selected cell
        grid.querySelectorAll('.form-cell').forEach(fc=>fc.classList.remove('hl'));
        c.classList.add('hl');
      };
      grid.appendChild(c);
    });
  }
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function stopAudio(){
  if(curAudio){curAudio.pause();curAudio.currentTime=0;curAudio=null;}
  if('speechSynthesis'in window)window.speechSynthesis.cancel();
  document.getElementById('card').classList.remove('playing');
}

const AUDIO_MAP = {1: "01_alef.mp3", 2: "02_ba.mp3", 3: "03_ta.mp3", 4: "04_tha.mp3", 5: "05_jeem.mp3", 6: "06_ha.mp3", 7: "07_kha.mp3", 8: "08_dal.mp3", 9: "09_thal.mp3", 10: "10_ra.mp3", 11: "11_zay.mp3", 12: "12_seen.mp3", 13: "13_sheen.mp3", 14: "14_sad.mp3", 15: "15_dad.mp3", 16: "16_ta2.mp3", 17: "17_dha.mp3", 18: "18_ain.mp3", 19: "19_ghain.mp3", 20: "20_fa.mp3", 21: "21_qaf.mp3", 23: "23_lam.mp3", 25: "25_noon.mp3", 26: "26_ha2.mp3", 27: "27_waw.mp3", 28: "28_ya.mp3"};

function playAudio(){
  stopAudio();
  const card=getCard();
  const sl=getSL();
  const cardEl=document.getElementById('card');
  // Level 1 sublevel 0 = use MP3 files
  if(curLvl===0&&curSub===0&&card.num&&AUDIO_MAP[card.num]){
    const a=new Audio('audio/'+AUDIO_MAP[card.num]);
    curAudio=a;
    cardEl.classList.add('playing');
    a.play().catch(()=>tts(card));
    a.onended=()=>cardEl.classList.remove('playing');
    a.onerror=()=>{cardEl.classList.remove('playing');tts(card);};
  } else {
    tts(card);
  }
}

function tts(card){
  if(!('speechSynthesis'in window))return;
  window.speechSynthesis.cancel();
  const cardEl=document.getElementById('card');
  const txt=card.tts||card.ar||card.nm||'';
  const utt=new SpeechSynthesisUtterance(txt);
  utt.lang='ar-SA';utt.rate=0.75;
  const voices=window.speechSynthesis.getVoices();
  const arV=voices.find(v=>v.lang.startsWith('ar'));
  if(arV)utt.voice=arV;
  cardEl.classList.add('playing');
  utt.onend=()=>cardEl.classList.remove('playing');
  window.speechSynthesis.speak(utt);
}

function handleClick(){
  playAudio();
  const rev=document.getElementById('cardReveal');
  const hint=document.getElementById('cardHint');
  if(rev.classList.contains('hidden')){
    rev.classList.remove('hidden');
    hint.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> tap to hear';
  }
}

function next(){
  stopAudio();
  const cards=getCards();
  if(curIdx<cards.length-1){curIdx++;render();if(mode==='auto')playAudio();}
  else{stopAuto();document.getElementById('doneBanner').classList.add('vis');}
}
function prev(){
  stopAudio();
  if(curIdx>0){curIdx--;render();}
}

// ── MODE ──────────────────────────────────────────────────────────────────────
function setMode(m,btn){
  stopAuto();stopAudio();mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('autoBox').classList.toggle('vis',m==='auto');
  document.getElementById('doneBanner').classList.remove('vis');
  curIdx=0;resetOrder();render();
  if(m==='auto'){playAudio();startAuto();}
}

function startAuto(){
  stopAuto();
  autoTimer=setInterval(()=>{
    autoReps++;
    if(autoReps<rep){playAudio();}
    else{autoReps=0;next();}
  },autoDelay);
}
function stopAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}}
function setDelay(v){autoDelay=v*1000;document.getElementById('delayVal').textContent=v+'s';if(mode==='auto'){startAuto();}}
function setRep(v){rep=parseInt(v);autoReps=0;}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.speechSynthesis&&window.speechSynthesis.getVoices();
buildSidebar();
loadLevel(0,0);
</script>
</body>
